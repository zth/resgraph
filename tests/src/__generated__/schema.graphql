
"""Custom scalar with specifiedByUrl coverage."""
scalar Uuid

input Res12InputInline {

  """Field doc on inline record."""
  payload: String!
}

input UpdateThingInput {
  name: UpdatableString!
  age: UpdatableInt!
  favoriteColor: UpdatableNullableString!
  isAdmin: UpdatableNullableBool!
  height: UpdatableNullableFloat!
}

input Res12Input @oneOf {

  """ Inline record doc is preserved. """
  inline: Res12InputInline
  empty: Boolean
}

input UpdatableBool @oneOf {
  updateValue: Boolean
  leaveUnchanged: Boolean
}

input UpdatableFloat @oneOf {
  updateValue: Float
  leaveUnchanged: Boolean
}

input UpdatableInt @oneOf {
  updateValue: Int
  leaveUnchanged: Boolean
}

input UpdatableNullableBool @oneOf {
  updateValue: Boolean
  unsetValue: Boolean
  leaveUnchanged: Boolean
}

input UpdatableNullableFloat @oneOf {
  updateValue: Float
  unsetValue: Boolean
  leaveUnchanged: Boolean
}

input UpdatableNullableInt @oneOf {
  updateValue: Int
  unsetValue: Boolean
  leaveUnchanged: Boolean
}

input UpdatableNullableString @oneOf {
  updateValue: String
  unsetValue: Boolean
  leaveUnchanged: Boolean
}

input UpdatableString @oneOf {
  updateValue: String
  leaveUnchanged: Boolean
}

interface Labelled {
  typenameEcho: String!
}


"""An object with an ID"""
interface Node {

  """The id of the object."""
  id: ID!
}

type FunctionFieldRegression {
  computedLabel: String!
  id: String!
}

type LabelledAlpha implements Labelled {
  extra: String!
  typenameEcho: String!
}

type LabelledBeta implements Labelled {
  count: Int!
  typenameEcho: String!
}

type Mutation {
  updateThing(thingId: ID!, input: UpdateThingInput!): Thing
}


"""Information about pagination in a connection."""
type PageInfo {

  """When paginating forwards, are there more items?"""
  hasNextPage: Boolean!

  """When paginating backwards, are there more items?"""
  hasPreviousPage: Boolean!

  """When paginating backwards, the cursor to continue."""
  startCursor: String

  """When paginating forwards, the cursor to continue."""
  endCursor: String
}

type Query {

  """Fetches objects given their IDs."""
  nodes(ids: [ID!]!): [Node]!

  """Fetches an object given its ID."""
  node(id: ID!): Node
  functionFieldRegression: FunctionFieldRegression!
  getLabelled: LabelledAlpha!
  getScalarHolder: ScalarHolder!
  nestedConnection: StringConnection!
  userConnection(first: Int, after: String): UserConnection!
}


"""Extra coverage for ReScript 12 CMT/attribute changes."""
type Res12Record {

  """Doc should survive on fields."""
  withDoc: String!

  """Deprecated attribute should survive too."""
  oldField: Int! @deprecated(reason: "old field")
}

type ScalarHolder {
  id: Uuid!
}

type StringConnection {
  pageInfo: PageInfo!
  edges: [StringEdge]
}

type StringEdge {
  cursor: String!
  node: String
}

type Subscription {
  latestMessage: String!
}

type Thing implements Node {
  name: String!
  age: Int!
  favoriteColor: String
  isAdmin: Boolean
  height: Float

  """The id of the object."""
  id: ID!
}

type User {

}

type UserConnection {
  pageInfo: PageInfo!
  edges: [UserEdge]
}

type UserEdge {
  cursor: String!
  node: User
}

